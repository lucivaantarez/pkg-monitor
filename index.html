<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saturnity Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05050f;--bg2:#08081a;--bg3:#0c0c22;
  --cyan:#00f5ff;--pink:#ff2d78;--purple:#b44bff;--green:#00ff9d;--yellow:#ffe600;--red:#ff2d55;
  --dim:#1a1a3a;--dim2:#0f0f28;--muted:#2a2a5a;
  --txt:#a0a0d0;--txt2:#d0d0ff;
  --mono:'Space Mono',monospace;--head:'Syne',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--txt2);font-family:var(--mono);overflow-x:hidden}
body::before{content:'';position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(0,245,255,.04),transparent 70%);top:-100px;left:-100px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(180,75,255,.04),transparent 70%);bottom:-100px;right:-100px;pointer-events:none;z-index:0}
.wrap{max-width:1500px;margin:0 auto;padding:18px 14px 60px;position:relative;z-index:1}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.hdr-title{font-family:var(--head);font-size:22px;font-weight:800;letter-spacing:-1px}
.hdr-title .s1{color:var(--cyan);text-shadow:0 0 30px rgba(0,245,255,.5)}
.hdr-title .s2{color:#fff}
.hdr-title .s3{color:var(--purple);text-shadow:0 0 30px rgba(180,75,255,.4)}
.hdr-sub{font-size:8px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;margin-top:3px}
.hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

.pill{display:flex;align-items:center;gap:5px;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;padding:5px 11px;border-radius:2px;cursor:pointer;user-select:none;font-family:var(--mono);transition:all .15s}
.pill-live{background:rgba(0,255,157,.06);border:1px solid rgba(0,255,157,.25);color:var(--green);cursor:default}
.pill-live .dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 1.5s ease-in-out infinite;box-shadow:0 0 6px var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.pill-hide{background:rgba(0,245,255,.05);border:1px solid rgba(0,245,255,.15);color:var(--cyan)}
.pill-hide:hover{background:rgba(0,245,255,.1);border-color:rgba(0,245,255,.4)}
.pill-hide.active{background:rgba(255,45,85,.06);border-color:rgba(255,45,85,.3);color:var(--red)}
.pill-offline{background:rgba(255,45,85,.06);border:1px solid rgba(255,45,85,.2);color:var(--red);cursor:default;display:none}
.pill-offline.show{display:flex}
.upd{font-size:8px;color:var(--muted);letter-spacing:1px}

/* countdown ring */
.cring{width:26px;height:26px;position:relative;flex-shrink:0}
.cring svg{transform:rotate(-90deg)}
.crn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--cyan)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.sc{background:var(--bg2);border:1px solid var(--dim);padding:13px 15px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc::after{content:'';position:absolute;top:0;left:0;bottom:0;width:1px;opacity:.5}
.sc.g::before{background:linear-gradient(90deg,var(--pink),var(--purple))}
.sc.g::after{background:var(--pink)}
.sc.g .sc-val{color:var(--pink);text-shadow:0 0 20px rgba(255,45,120,.3)}
.sc.t::before{background:linear-gradient(90deg,var(--cyan),var(--purple))}
.sc.t::after{background:var(--cyan)}
.sc.t .sc-val{color:var(--cyan);text-shadow:0 0 20px rgba(0,245,255,.3)}
.sc.a::before{background:linear-gradient(90deg,var(--green),var(--cyan))}
.sc.a::after{background:var(--green)}
.sc.a .sc-val{color:var(--green);text-shadow:0 0 20px rgba(0,255,157,.3)}
.sc.c::before{background:linear-gradient(90deg,var(--muted),transparent)}
.sc.c::after{background:var(--muted)}
.sc.c .sc-val{color:var(--muted)}
.sc-label{font-size:7.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.sc-val{font-size:30px;font-weight:700;font-family:var(--head);line-height:1;transition:all .3s}

/* error */
.errbanner{display:none;gap:8px;align-items:center;background:rgba(255,45,85,.06);border:1px solid rgba(255,45,85,.2);color:var(--red);padding:9px 12px;margin-bottom:14px;font-size:10px}
.errbanner.show{display:flex}

/* GRID */
#grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

/* CARD */
.wcard{background:var(--bg2);border:1px solid var(--dim);position:relative;overflow:hidden;cursor:pointer;transition:border-color .2s,box-shadow .2s,transform .15s}
.wcard:hover{transform:translateY(-2px)}
.wcard:hover .wcard-glow{opacity:1}
.wcard:nth-child(4n+1){border-top:2px solid var(--cyan)}
.wcard:nth-child(4n+1):hover{border-color:var(--cyan);box-shadow:0 8px 40px rgba(0,245,255,.08),0 0 0 1px rgba(0,245,255,.08)}
.wcard:nth-child(4n+2){border-top:2px solid var(--purple)}
.wcard:nth-child(4n+2):hover{border-color:var(--purple);box-shadow:0 8px 40px rgba(180,75,255,.08),0 0 0 1px rgba(180,75,255,.08)}
.wcard:nth-child(4n+3){border-top:2px solid var(--pink)}
.wcard:nth-child(4n+3):hover{border-color:var(--pink);box-shadow:0 8px 40px rgba(255,45,120,.08),0 0 0 1px rgba(255,45,120,.08)}
.wcard:nth-child(4n+0){border-top:2px solid var(--green)}
.wcard:nth-child(4n+0):hover{border-color:var(--green);box-shadow:0 8px 40px rgba(0,255,157,.08),0 0 0 1px rgba(0,255,157,.08)}
.wcard.alerted{animation:alertshake .4s ease,alertglow 1.5s ease 3}
@keyframes alertshake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes alertglow{0%,100%{box-shadow:0 0 0 rgba(255,45,85,0)}50%{box-shadow:0 0 30px rgba(255,45,85,.3)}}
.wcard-glow{position:absolute;inset:0;opacity:0;transition:opacity .2s;pointer-events:none;background:radial-gradient(ellipse at top,rgba(0,245,255,.03),transparent 60%)}

.wcard-hdr{padding:8px 11px;border-bottom:1px solid var(--dim2);display:flex;align-items:center;justify-content:space-between;background:var(--bg3)}
.wcard-bot{font-size:9px;color:var(--txt);letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.wcard-badges{display:flex;gap:4px;flex-shrink:0}
.wbadge{font-size:7px;letter-spacing:.8px;text-transform:uppercase;padding:2px 6px;border-radius:2px;font-weight:700}
.wbadge-on{background:rgba(0,255,157,.08);color:var(--green);border:1px solid rgba(0,255,157,.2)}
.wbadge-alert{background:rgba(255,45,85,.1);color:var(--red);border:1px solid rgba(255,45,85,.25);display:none}
.wbadge-alert.show{display:inline-block;animation:badgepulse 1s ease infinite}
@keyframes badgepulse{0%,100%{opacity:1}50%{opacity:.5}}
.wbadge-t{background:rgba(0,0,0,.3);color:var(--muted);border:1px solid var(--dim)}

.age-bar{height:1px;background:var(--dim2)}
.age-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--yellow) 65%,var(--red));transition:width .5s}

/* PACKAGE ROWS */
.pkg-list{padding:6px 8px}
.pkg-item{padding:7px 8px;border-radius:3px;margin-bottom:4px;background:var(--bg3);border:1px solid transparent;transition:border-color .15s}
.pkg-item:last-child{margin-bottom:0}
.pkg-item.ig{border-color:rgba(0,255,157,.1)}
.pkg-item.cl{opacity:.45}
.pkg-item.just-closed{border-color:rgba(255,45,85,.3)!important;opacity:1!important;animation:closedflash 2s ease}
@keyframes closedflash{0%,100%{background:var(--bg3)}30%{background:rgba(255,45,85,.08)}}

.pkg-r1{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.sbadge{font-size:6.5px;letter-spacing:1px;text-transform:uppercase;font-weight:700;padding:2px 5px;border-radius:2px;flex-shrink:0}
.sbadge.ig{background:rgba(0,255,157,.1);color:var(--green);border:1px solid rgba(0,255,157,.2)}
.sbadge.cl{background:rgba(255,45,85,.06);color:var(--red);border:1px solid rgba(255,45,85,.15)}
.pkg-name{font-size:7.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}

.pkg-r2{font-family:var(--head);font-size:12px;font-weight:700;color:#e8e8ff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.pkg-r2:hover{color:var(--cyan)}
.pkg-r2:active::after{content:' ✓';font-size:9px;color:var(--green)}

.pkg-r3{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.pkg-id-wrap{display:flex;align-items:center;gap:3px}
.id-lbl{font-size:7px;color:var(--muted)}
.pkg-id{font-size:7.5px;color:var(--muted);cursor:pointer}
.pkg-id:hover{color:var(--cyan)}
.pkg-lastactive{font-size:7px;color:var(--muted);text-align:right;flex-shrink:0}
.pkg-lastactive.recent{color:var(--green)}
.pkg-lastactive.mid{color:var(--yellow)}
.pkg-lastactive.old{color:var(--red)}

.pkg-r4{display:flex;align-items:center;gap:5px}
.cpu-num{font-size:9px;font-weight:700;min-width:34px}
.cpu-bar{flex:1;height:2px;background:var(--dim);border-radius:1px;overflow:hidden}
.cpu-fill{height:100%;border-radius:1px;transition:width .4s}
.pkg-mem{font-size:7.5px;color:var(--txt);opacity:.7;min-width:44px;text-align:right}

/* HIDE IDENTITY */
body.hide-id .pkg-r2{filter:blur(6px);transition:filter .2s}
body.hide-id .pkg-id{filter:blur(4px);transition:filter .2s}
body.hide-id .pkg-r2:hover,body.hide-id .pkg-id:hover{filter:blur(0)}

/* EMPTY */
.empty{grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--muted)}
.ei{font-size:36px;margin-bottom:12px;opacity:.3}
.et{font-size:12px;letter-spacing:3px;text-transform:uppercase;font-family:var(--head);margin-bottom:6px;color:#2a2a6a}
.es{font-size:9px;line-height:2.2;color:var(--muted)}

/* FOCUS OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(6px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.focus-card{background:var(--bg2);border:1px solid var(--cyan);box-shadow:0 0 80px rgba(0,245,255,.12),inset 0 0 40px rgba(0,245,255,.02);max-width:500px;width:100%;max-height:88vh;overflow-y:auto;animation:fin .2s ease;position:relative}
@keyframes fin{from{transform:scale(.96) translateY(10px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.focus-close{position:absolute;top:12px;right:14px;font-size:9px;color:var(--muted);cursor:pointer;padding:3px 10px;border:1px solid var(--dim);letter-spacing:1px;transition:all .15s}
.focus-close:hover{color:var(--red);border-color:var(--red)}
.focus-hdr{padding:13px 50px 13px 15px;border-bottom:1px solid var(--dim);position:relative}
.focus-hdr::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--purple))}
.focus-bot{font-size:9px;color:var(--cyan);letter-spacing:1px;margin-bottom:2px}
.focus-meta{font-size:11px;color:var(--txt2);font-family:var(--head);font-weight:700}
.focus-actions{display:flex;gap:6px;padding:8px 12px;border-bottom:1px solid var(--dim);background:var(--bg3)}
.faction{font-size:7.5px;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border:1px solid var(--dim);color:var(--muted);cursor:pointer;transition:all .15s}
.faction:hover{border-color:var(--cyan);color:var(--cyan)}
.focus-body{padding:10px 12px}
.fp{background:var(--bg3);border:1px solid var(--dim);padding:10px 12px;margin-bottom:8px}
.fp:last-child{margin-bottom:0}
.fp-r1{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.fp-sbadge{font-size:7px;letter-spacing:1.2px;text-transform:uppercase;font-weight:700;padding:2px 7px;border-radius:2px}
.fp-sbadge.ig{background:rgba(0,255,157,.1);color:var(--green);border:1px solid rgba(0,255,157,.25)}
.fp-sbadge.cl{background:rgba(255,45,85,.08);color:var(--red);border:1px solid rgba(255,45,85,.2)}
.fp-pkg{font-size:8.5px;color:var(--muted)}
.fp-uname{font-family:var(--head);font-size:15px;font-weight:700;color:#fff;margin-bottom:7px;cursor:pointer}
.fp-uname:hover{color:var(--cyan)}
.fp-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.fp-box{background:var(--bg2);border:1px solid var(--dim);padding:7px 9px}
.fp-lbl{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.fp-val{font-size:12px;font-weight:700;color:var(--txt2)}
.fp-val.cp{cursor:pointer}
.fp-val.cp:hover{color:var(--cyan)}
.fp-cpu-bar{height:2px;background:var(--dim);margin-top:4px;overflow:hidden;border-radius:1px}
.fp-cpu-fill{height:100%;border-radius:1px}
.fp-lastactive{font-size:8px;color:var(--muted);margin-top:5px}
body.hide-id .fp-uname{filter:blur(6px)}
body.hide-id .fp-uname:hover{filter:blur(0)}
body.hide-id .fp-id-val{filter:blur(5px)}
body.hide-id .fp-id-val:hover{filter:blur(0)}

/* toast */
.toast{position:fixed;bottom:24px;right:20px;background:var(--bg3);border:1px solid var(--cyan);color:var(--cyan);font-size:9px;letter-spacing:1px;padding:8px 16px;z-index:9999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

@media(max-width:1100px){#grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:800px){#grid{grid-template-columns:repeat(2,1fr)}.stats{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){#grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.sc-val{font-size:24px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div>
      <div class="hdr-title"><span class="s1">SATURN</span><span class="s2">ITY</span> <span class="s3">MONITOR</span></div>
      <div class="hdr-sub">Discord Channel · Live Dashboard</div>
    </div>
    <div class="hdr-right">
      <div class="pill pill-offline" id="offlinePill">● Tab Hidden</div>
      <div class="pill pill-hide" id="hideBtn" onclick="toggleHide()"><span id="hideTxt">Hide Identity</span></div>
      <div class="upd" id="ts">–</div>
      <div class="cring">
        <svg width="26" height="26" viewBox="0 0 26 26">
          <circle cx="13" cy="13" r="10" fill="none" stroke="rgba(0,245,255,0.1)" stroke-width="2.5"/>
          <circle id="arc" cx="13" cy="13" r="10" fill="none" stroke="#00f5ff" stroke-width="2.5" stroke-dasharray="62.8" stroke-dashoffset="0" stroke-linecap="round"/>
        </svg>
        <div class="crn" id="crn">30</div>
      </div>
      <div class="pill pill-live"><div class="dot"></div>Live</div>
    </div>
  </div>

  <div class="stats">
    <div class="sc g"><div class="sc-label">Total Groups</div><div class="sc-val" id="s-g">–</div></div>
    <div class="sc t"><div class="sc-label">Total Packages</div><div class="sc-val" id="s-t">–</div></div>
    <div class="sc a"><div class="sc-label">In-Game</div><div class="sc-val" id="s-a">–</div></div>
    <div class="sc c"><div class="sc-label">Closed</div><div class="sc-val" id="s-c">–</div></div>
  </div>

  <div class="errbanner" id="err"><span>✕</span><span id="errmsg">–</span></div>
  <div id="grid"><div class="empty"><div class="ei">📡</div><div class="et">Connecting…</div><div class="es">Fetching from Discord.</div></div></div>
</div>

<!-- FOCUS OVERLAY -->
<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="focus-card" id="focusCard">
    <div class="focus-close" onclick="closeOverlayDirect()">ESC ✕</div>
    <div class="focus-hdr">
      <div class="focus-bot" id="focusBot"></div>
      <div class="focus-meta" id="focusMeta"></div>
    </div>
    <div class="focus-actions">
      <div class="faction" onclick="copyAllUsernames()">Copy All Usernames</div>
      <div class="faction" onclick="copyAllIds()">Copy All IDs</div>
    </div>
    <div class="focus-body" id="focusBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var WORKER_URL = "https://aged-frog-3fbc.susilobambangyowaimo.workers.dev";
var POLL=30000, INACTIVE=1800, CIRC=62.8;
var cd=30, hidden=false;
var prevData = {}; // keyed by msg_id → status snapshot
var focusCardData = null;

// ── HELPERS ──
function cpuCol(p){return p<60?"#00ff9d":p<85?"#ffe600":"#ff2d55"}
function agePct(s){return Math.min((s/INACTIVE)*100,100)}
function minsLeft(s){return Math.max(0,Math.round((INACTIVE-s)/60))}

function lastActiveLabel(timeStr) {
  // timeStr is HH:MM:SS — just show it directly, no timezone math
  if (!timeStr) return "";
  return timeStr;
}

function lastActiveClass(timeStr) {
  // Can't reliably compute age from HH:MM:SS without knowing timezone
  // Just return recent always so it doesn't show misleading red
  return "recent";
}

function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 2000);
}

function copyText(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function(){ showToast("Copied!"); });
  } else {
    var el = document.createElement("textarea");
    el.value = text; document.body.appendChild(el);
    el.select(); document.execCommand("copy"); document.body.removeChild(el);
    showToast("Copied!");
  }
}

// ── CARD BUILDER ──
function pkgRow(p) {
  var ig = p.status === "IN-GAME";
  var col = cpuCol(parseFloat(p.cpu)||0);
  var cpu = parseFloat(p.cpu)||0;
  var la = lastActiveLabel(p.time);
  var lac = lastActiveClass(p.time);
  return '<div class="pkg-item '+(ig?"ig":"cl")+'" id="pkg-'+p.device_id+'">'
    +'<div class="pkg-r1">'
    +'<span class="sbadge '+(ig?"ig":"cl")+'">'+(ig?"IN-GAME":"CLOSED")+'</span>'
    +'<span class="pkg-name">'+p.package+'</span>'
    +'</div>'
    +'<div class="pkg-r2" onclick="copyText(\''+p.username+'\')" title="Click to copy">'+p.username+'</div>'
    +'<div class="pkg-r3">'
    +'<div class="pkg-id-wrap"><span class="id-lbl">ID&nbsp;</span><span class="pkg-id" onclick="copyText(\''+p.device_id+'\')" title="Click to copy">'+p.device_id+'</span></div>'
    +'<span class="pkg-lastactive '+lac+'">'+la+'</span>'
    +'</div>'
    +'<div class="pkg-r4">'
    +'<span class="cpu-num" style="color:'+col+'">'+p.cpu+'</span>'
    +'<div class="cpu-bar"><div class="cpu-fill" style="width:'+cpu+'%;background:'+col+'"></div></div>'
    +'<span class="pkg-mem">'+p.memory+'</span>'
    +'</div>'
    +'</div>';
}

function buildCard(c, i) {
  var active = c.packages.filter(function(p){return p.status==="IN-GAME";}).length;
  var closedCount = c.packages.length - active;
  return '<div class="wcard" id="card-'+c.msg_id+'" style="animation-delay:'+(i*0.06).toFixed(2)+'s" onclick="openFocus(\''+c.msg_id+'\')">'
    +'<div class="wcard-glow"></div>'
    +'<div class="wcard-hdr">'
    +'<span class="wcard-bot">'+c.bot_name+'</span>'
    +'<div class="wcard-badges">'
    +'<span class="wbadge wbadge-alert" id="alert-'+c.msg_id+'">⚠ CLOSED</span>'
    +'<span class="wbadge wbadge-on">'+active+'/'+c.packages.length+'</span>'
    +'<span class="wbadge wbadge-t">'+minsLeft(c.age_seconds)+'m</span>'
    +'</div></div>'
    +'<div class="age-bar"><div class="age-bar-fill" style="width:'+agePct(c.age_seconds)+'%"></div></div>'
    +'<div class="pkg-list">'+c.packages.map(pkgRow).join("")+'</div>'
    +'</div>';
}

// ── FOCUS ──
function openFocus(msgId) {
  var c = currentCards.find(function(c){ return c.msg_id === msgId; });
  if (!c) return;
  focusCardData = c;
  document.getElementById("focusBot").textContent = c.bot_name;
  var active = c.packages.filter(function(p){return p.status==="IN-GAME";}).length;
  document.getElementById("focusMeta").textContent = c.packages.length+" packages · "+active+" active · "+minsLeft(c.age_seconds)+"m left";
  document.getElementById("focusBody").innerHTML = c.packages.map(function(p){
    var ig = p.status==="IN-GAME", col = cpuCol(parseFloat(p.cpu)||0);
    var la = lastActiveLabel(p.time);
    return '<div class="fp">'
      +'<div class="fp-r1"><span class="fp-sbadge '+(ig?"ig":"cl")+'">'+(ig?"IN-GAME":"CLOSED")+'</span><span class="fp-pkg">'+p.package+'</span></div>'
      +'<div class="fp-uname" onclick="copyText(\''+p.username+'\')" title="Click to copy">'+p.username+'</div>'
      +'<div class="fp-grid">'
      +'<div class="fp-box"><div class="fp-lbl">Device ID</div><div class="fp-val fp-id-val cp" onclick="copyText(\''+p.device_id+'\')" title="Click to copy">'+p.device_id+'</div></div>'
      +'<div class="fp-box"><div class="fp-lbl">Memory</div><div class="fp-val">'+p.memory+'</div></div>'
      +'<div class="fp-box"><div class="fp-lbl">CPU</div><div class="fp-val" style="color:'+col+'">'+p.cpu+'<div class="fp-cpu-bar"><div class="fp-cpu-fill" style="width:'+(parseFloat(p.cpu)||0)+'%;background:'+col+'"></div></div></div></div>'
      +'<div class="fp-box"><div class="fp-lbl">Last Active</div><div class="fp-val">'+la+'<br><span style="font-size:9px;color:var(--muted)">'+p.time+'</span></div></div>'
      +'</div></div>';
  }).join("");
  document.getElementById("overlay").classList.add("open");
}
function closeOverlay(e){ if(e.target===document.getElementById("overlay")) closeOverlayDirect(); }
function closeOverlayDirect(){ document.getElementById("overlay").classList.remove("open"); }
document.addEventListener("keydown", function(e){ if(e.key==="Escape") closeOverlayDirect(); });

function copyAllUsernames(){
  if (!focusCardData) return;
  var names = focusCardData.packages.map(function(p){return p.username;}).filter(Boolean).join("\n");
  copyText(names);
}
function copyAllIds(){
  if (!focusCardData) return;
  var ids = focusCardData.packages.map(function(p){return p.device_id;}).filter(Boolean).join("\n");
  copyText(ids);
}

// ── FETCH & RENDER ──
var currentCards = [];

async function go() {
  cd = POLL/1000;
  // Skip if tab is hidden
  if (document.hidden) {
    document.getElementById("offlinePill").classList.add("show");
    return;
  }
  document.getElementById("offlinePill").classList.remove("show");

  var eb = document.getElementById("err");
  try {
    var r = await fetch(WORKER_URL+"/status", {cache:"no-store"});
    if (!r.ok) throw new Error("HTTP "+r.status);
    var d = await r.json();
    if (d.error) throw new Error(d.error);

    // Update stats
    lastStats.g = d.cards ? d.cards.length : 0;
    lastStats.t = d.total_packages||0;
    lastStats.a = d.active||0;
    lastStats.c = d.closed||0;
    updateStats();
    document.getElementById("ts").textContent = "UPDATED "+new Date().toLocaleTimeString("id-ID",{hour12:false});

    var g = document.getElementById("grid");
    if (!d.cards || !d.cards.length) {
      currentCards = [];
      g.innerHTML = '<div class="empty"><div class="ei">📭</div><div class="et">No active packages</div><div class="es">No messages in last 30 minutes.</div></div>';
      eb.classList.remove("show");
      return;
    }

    // Check for new closed packages — alert
    var newAlerts = [];
    d.cards.forEach(function(c) {
      var key = c.msg_id;
      var prev = prevData[key];
      c.packages.forEach(function(p) {
        var prevStatus = prev && prev[p.username];
        if (prevStatus === "IN-GAME" && p.status === "CLOSED") {
          newAlerts.push(p.username || p.package);
        }
      });
      // Save current state
      prevData[key] = {};
      c.packages.forEach(function(p){ prevData[key][p.username] = p.status; });
    });

    // Build or update DOM
    var existingIds = Array.from(g.querySelectorAll(".wcard")).map(function(el){ return el.id; });
    var newIds = d.cards.map(function(c){ return "card-"+c.msg_id; });

    // If card set changed, rebuild entirely
    var sameSet = existingIds.length === newIds.length && newIds.every(function(id,i){ return id===existingIds[i]; });
    if (!sameSet) {
      g.innerHTML = d.cards.map(buildCard).join("");
    } else {
      // In-place update — no DOM rebuild
      d.cards.forEach(function(c) {
        var cardEl = document.getElementById("card-"+c.msg_id);
        if (!cardEl) return;
        var active = c.packages.filter(function(p){return p.status==="IN-GAME";}).length;
        // Update age bar
        var fill = cardEl.querySelector(".age-bar-fill");
        if (fill) fill.style.width = agePct(c.age_seconds)+"%";
        // Update time badge
        var tbadge = cardEl.querySelectorAll(".wbadge-t")[0];
        if (tbadge) tbadge.textContent = minsLeft(c.age_seconds)+"m";
        // Update active count badge
        var obadge = cardEl.querySelectorAll(".wbadge-on")[0];
        if (obadge) obadge.textContent = active+"/"+c.packages.length;
        // Update package rows
        c.packages.forEach(function(p) {
          var pkgEl = cardEl.querySelector("#pkg-"+p.device_id);
          if (!pkgEl) return;
          var ig = p.status==="IN-GAME";
          var col = cpuCol(parseFloat(p.cpu)||0);
          var cpu = parseFloat(p.cpu)||0;
          pkgEl.className = "pkg-item "+(ig?"ig":"cl");
          var sb = pkgEl.querySelector(".sbadge");
          if (sb) { sb.className="sbadge "+(ig?"ig":"cl"); sb.textContent=ig?"IN-GAME":"CLOSED"; }
          var cpuNum = pkgEl.querySelector(".cpu-num");
          if (cpuNum) { cpuNum.style.color=col; cpuNum.textContent=p.cpu; }
          var cpuFill = pkgEl.querySelector(".cpu-fill");
          if (cpuFill) { cpuFill.style.width=cpu+"%"; cpuFill.style.background=col; }
          var mem = pkgEl.querySelector(".pkg-mem");
          if (mem) mem.textContent = p.memory;
          var la = pkgEl.querySelector(".pkg-lastactive");
          if (la) { la.textContent=lastActiveLabel(p.time); la.className="pkg-lastactive "+lastActiveClass(p.time); }
        });
      });
    }

    currentCards = d.cards;

    // Trigger alerts for closed packages
    if (newAlerts.length > 0) {
      newAlerts.forEach(function(name) {
        showToast("⚠ CLOSED: "+name);
      });
      // Find and shake affected cards
      d.cards.forEach(function(c) {
        var hasNewClosed = c.packages.some(function(p){
          return newAlerts.indexOf(p.username||p.package) > -1;
        });
        if (hasNewClosed) {
          var cardEl = document.getElementById("card-"+c.msg_id);
          if (cardEl) {
            cardEl.classList.remove("alerted");
            void cardEl.offsetWidth;
            cardEl.classList.add("alerted");
            var alertBadge = document.getElementById("alert-"+c.msg_id);
            if (alertBadge) alertBadge.classList.add("show");
          }
        }
      });
    }

    eb.classList.remove("show");
  } catch(e) {
    document.getElementById("errmsg").textContent = "Error: "+e.message;
    eb.classList.add("show");
  }
}

// ── TICK ──
function tick() {
  cd--;
  if (cd < 0) cd = POLL/1000;
  document.getElementById("crn").textContent = cd;
  document.getElementById("arc").style.strokeDashoffset = CIRC*(1 - cd/(POLL/1000));
  if (cd === 0) go();
}

// ── HIDE IDENTITY ──
var hidden = false;
var lastStats = {g:0,t:0,a:0,c:0};
function updateStats(){
  var m = hidden ? 5 : 1;
  document.getElementById("s-g").textContent = lastStats.g * m;
  document.getElementById("s-t").textContent = lastStats.t * m;
  document.getElementById("s-a").textContent = lastStats.a * m;
  document.getElementById("s-c").textContent = lastStats.c * m;
}
function toggleHide() {
  hidden = !hidden;
  document.body.classList.toggle("hide-id", hidden);
  document.getElementById("hideBtn").classList.toggle("active", hidden);
  document.getElementById("hideTxt").textContent = hidden ? "Show Identity" : "Hide Identity";
  updateStats();
}

// ── VISIBILITY API — skip fetch when tab hidden ──
document.addEventListener("visibilitychange", function() {
  if (!document.hidden) {
    document.getElementById("offlinePill").classList.remove("show");
    go(); // fetch immediately when tab comes back
  }
});

go();
setInterval(tick, 1000);
</script>
